services:
  postgres:
    image: ${LORE_POSTGRES_IMAGE:-fffattiger/pgvector-zhparser:pg16}
    build:
      context: ./postgres
    container_name: ${LORE_POSTGRES_CONTAINER:-lore-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lore}
      POSTGRES_USER: ${POSTGRES_USER:-lore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lore} -d ${POSTGRES_DB:-lore}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${LORE_FRONTEND_IMAGE:-fffattiger/lore:latest}
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lore:change-me@postgres:5432/lore}
      API_TOKEN: ${API_TOKEN:-}
      # Boot is fixed server-side to core://agent, core://soul, preferences://user
      SNAPSHOT_DIR: /app/snapshots
      LORE_EMBEDDING_PROVIDER: ${LORE_EMBEDDING_PROVIDER:-openai_compatible}
      LORE_EMBEDDING_BASE_URL: ${LORE_EMBEDDING_BASE_URL:-http://127.0.0.1:8090/v1}
      LORE_EMBEDDING_API_KEY: ${LORE_EMBEDDING_API_KEY:-change-me}
      LORE_EMBEDDING_MODEL: ${LORE_EMBEDDING_MODEL:-text-embedding-3-small}
      LORE_VIEW_LLM_PROVIDER: ${LORE_VIEW_LLM_PROVIDER:-openai_compatible}
      LORE_VIEW_LLM_BASE_URL: ${LORE_VIEW_LLM_BASE_URL:-http://127.0.0.1:8090/v1}
      LORE_VIEW_LLM_API_KEY: ${LORE_VIEW_LLM_API_KEY:-change-me}
      LORE_VIEW_LLM_MODEL: ${LORE_VIEW_LLM_MODEL:-deepseek-v4-flash}
      LORE_VIEW_LLM_TIMEOUT_MS: ${LORE_VIEW_LLM_TIMEOUT_MS:-30000}
      LORE_VIEW_LLM_API_VERSION: ${LORE_VIEW_LLM_API_VERSION:-}
      LORE_VIEW_LLM_MAX_DOCS_PER_RUN: ${LORE_VIEW_LLM_MAX_DOCS_PER_RUN:-4}
    ports:
      - "${WEB_PORT:-18901}:18901"
    volumes:
      - lore_frontend_snapshots:/app/snapshots

volumes:
  lore_postgres_data:
  lore_frontend_snapshots:
