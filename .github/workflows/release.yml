name: Release Image

on:
  release:
    types: [published]

jobs:
  web-amd64:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push release
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/amd64
          push: true
          tags: |
            fffattiger/lore:latest-amd64
            fffattiger/lore:${{ steps.version.outputs.tag }}-amd64
          cache-from: type=gha,scope=web-amd64
          cache-to: type=gha,scope=web-amd64,mode=min

  web-arm64:
    runs-on: ubuntu-latest
    needs: web-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release arm64
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/arm64
          push: true
          tags: |
            fffattiger/lore:latest-arm64
            fffattiger/lore:${{ needs.web-amd64.outputs.version_tag }}-arm64
          cache-from: type=gha,scope=web-arm64
          cache-to: type=gha,scope=web-arm64,mode=min

      - name: Publish multi-arch tags
        run: |
          docker buildx imagetools create \
            -t fffattiger/lore:latest \
            fffattiger/lore:latest-amd64 \
            fffattiger/lore:latest-arm64
          docker buildx imagetools create \
            -t fffattiger/lore:${{ needs.web-amd64.outputs.version_tag }} \
            fffattiger/lore:${{ needs.web-amd64.outputs.version_tag }}-amd64 \
            fffattiger/lore:${{ needs.web-amd64.outputs.version_tag }}-arm64
          docker buildx imagetools inspect fffattiger/lore:latest
