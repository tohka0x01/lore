name: Build & Push Dev Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'claudecode-plugin/**'
      - '.github/workflows/docker-build.yml'

jobs:
  web-amd64:
    runs-on: ubuntu-latest
    outputs:
      date_tag: ${{ steps.tags.outputs.date_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          DATE=$(date -u +'%Y%m%d-%H%M')
          echo "date_tag=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/amd64
          push: true
          tags: |
            fffattiger/lore:dev-latest-amd64
            fffattiger/lore:dev-${{ steps.tags.outputs.date_tag }}-amd64
          cache-from: type=gha,scope=web-amd64
          cache-to: type=gha,scope=web-amd64,mode=min

  web-arm64:
    runs-on: ubuntu-latest
    needs: web-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web arm64
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/arm64
          push: true
          tags: |
            fffattiger/lore:dev-latest-arm64
            fffattiger/lore:dev-${{ needs.web-amd64.outputs.date_tag }}-arm64
          cache-from: type=gha,scope=web-arm64
          cache-to: type=gha,scope=web-arm64,mode=min

      - name: Publish multi-arch tags
        run: |
          docker buildx imagetools create \
            -t fffattiger/lore:dev-latest \
            fffattiger/lore:dev-latest-amd64 \
            fffattiger/lore:dev-latest-arm64
          docker buildx imagetools create \
            -t fffattiger/lore:dev-${{ needs.web-amd64.outputs.date_tag }} \
            fffattiger/lore:dev-${{ needs.web-amd64.outputs.date_tag }}-amd64 \
            fffattiger/lore:dev-${{ needs.web-amd64.outputs.date_tag }}-arm64
          docker buildx imagetools inspect fffattiger/lore:dev-latest
