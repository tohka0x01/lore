name: Dev Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'claudecode-plugin/**'
      - '.github/workflows/docker-build.yml'

jobs:
  tags:
    runs-on: ubuntu-latest
    outputs:
      date_tag: ${{ steps.meta.outputs.date_tag }}
    steps:
      - name: Generate image tags
        id: meta
        run: |
          DATE=$(date -u +'%Y%m%d-%H%M')
          echo "date_tag=${DATE}" >> "$GITHUB_OUTPUT"

  build-amd64:
    runs-on: ubuntu-latest
    needs: tags
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/amd64
          push: true
          tags: |
            fffattiger/lore:dev-latest-amd64
            fffattiger/lore:dev-${{ needs.tags.outputs.date_tag }}-amd64
          cache-from: type=gha,scope=web-amd64
          cache-to: type=gha,scope=web-amd64,mode=min

  build-arm64:
    runs-on: ubuntu-latest
    needs: tags
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/arm64
          push: true
          tags: |
            fffattiger/lore:dev-latest-arm64
            fffattiger/lore:dev-${{ needs.tags.outputs.date_tag }}-arm64
          cache-from: type=gha,scope=web-arm64
          cache-to: type=gha,scope=web-arm64,mode=min

  merge-manifest:
    runs-on: ubuntu-latest
    needs: [tags, build-amd64, build-arm64]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t fffattiger/lore:dev-latest \
            fffattiger/lore:dev-latest-amd64 \
            fffattiger/lore:dev-latest-arm64
          docker buildx imagetools create \
            -t fffattiger/lore:dev-${{ needs.tags.outputs.date_tag }} \
            fffattiger/lore:dev-${{ needs.tags.outputs.date_tag }}-amd64 \
            fffattiger/lore:dev-${{ needs.tags.outputs.date_tag }}-arm64
          docker buildx imagetools inspect fffattiger/lore:dev-latest
